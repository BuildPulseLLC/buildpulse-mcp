name: release-mcp

# Tag-driven release of the BuildPulse MCP server.
#
# Push a tag of the form `mcp-vX.Y.Z` (e.g. `git tag mcp-v0.1.0 && git push --tags`)
# to:
#   1. Cross-compile cmd/mcp for darwin/linux/windows (amd64 + arm64)
#   2. Upload gzipped binaries to a GitHub Release
#   3. Publish the @buildpulse/mcp npm package (whose postinstall fetches them)
#
# The release tag and npm version must match — the npm package looks up
# its binaries by `mcp-v${version}` from package.json.

on:
  push:
    tags:
      - "mcp-v*"

permissions:
  contents: write   # create release
  id-token: write   # npm provenance (OIDC)

jobs:
  build-binaries:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-amd64
            runs-on: macos-latest
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            runs-on: macos-latest
            goos: darwin
            goarch: arm64
          - target: linux-amd64
            runs-on: ubuntu-latest
            goos: linux
            goarch: amd64
          - target: linux-arm64
            runs-on: ubuntu-latest
            goos: linux
            goarch: arm64
          - target: windows-amd64
            runs-on: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out="buildpulse-mcp${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/mcp
          gzip -9 -c "$out" > "buildpulse-mcp-${{ matrix.target }}.gz"
          sha256sum "buildpulse-mcp-${{ matrix.target }}.gz" > "buildpulse-mcp-${{ matrix.target }}.gz.sha256" || \
            shasum -a 256 "buildpulse-mcp-${{ matrix.target }}.gz" > "buildpulse-mcp-${{ matrix.target }}.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: mcp-${{ matrix.target }}
          path: |
            buildpulse-mcp-${{ matrix.target }}.gz
            buildpulse-mcp-${{ matrix.target }}.gz.sha256

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check for NPM_TOKEN
        id: token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::warning::NPM_TOKEN secret is not configured — skipping npm publish."
            echo "::warning::Binaries are still attached to the GitHub Release."
            echo "::warning::To enable publishing, add an Automation token from npmjs.com → Access Tokens to repo Settings → Secrets → Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.token.outputs.skip == 'false'
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set package version from tag
        if: steps.token.outputs.skip == 'false'
        working-directory: npm
        run: |
          # Strip the "mcp-v" prefix from the tag.
          version="${GITHUB_REF_NAME#mcp-v}"
          npm version "$version" --no-git-tag-version --allow-same-version

      - name: Publish (with provenance)
        if: steps.token.outputs.skip == 'false'
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # The postinstall calls install.js which would try to download
          # the just-published GitHub release. Skip during publish — npm
          # only needs the source files in the tarball, not the binary.
          BUILDPULSE_MCP_SKIP_INSTALL: "1"
        # --provenance attaches a Sigstore attestation linking this
        # tarball to its GitHub Actions source workflow. npm only
        # accepts provenance from PUBLIC source repos — this one is
        # public, so it works.
        run: npm publish --provenance --access public

  publish-mcp-registry:
    # Must run AFTER publish-npm so the version exists on npm by the
    # time the MCP Registry validates `packages[].identifier`.
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # github-oidc auth into the MCP Registry
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Wait for npm propagation
        # `npm publish` returns before the new version is globally
        # readable from the public registry — usually a few seconds,
        # sometimes 30s+. Poll until the tag is queryable.
        run: |
          version="${GITHUB_REF_NAME#mcp-v}"
          for i in $(seq 1 24); do
            if npm view "@buildpulse/mcp@$version" version >/dev/null 2>&1; then
              echo "npm has @buildpulse/mcp@$version"
              exit 0
            fi
            echo "Waiting for @buildpulse/mcp@$version to propagate (try $i)..."
            sleep 5
          done
          echo "::error::npm version $version never showed up after 2 minutes"
          exit 1

      - name: Install mcp-publisher
        run: |
          curl -sL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz"
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher
          ./mcp-publisher --help >/dev/null

      - name: Sync server.json version to release tag
        run: |
          version="${GITHUB_REF_NAME#mcp-v}"
          python3 - "$version" <<'PY'
          import json, sys
          version = sys.argv[1]
          with open("server.json") as f:
              d = json.load(f)
          d["version"] = version
          for pkg in d.get("packages", []):
              pkg["version"] = version
          with open("server.json", "w") as f:
              json.dump(d, f, indent=2)
              f.write("\n")
          PY

      - name: Login (GitHub Actions OIDC)
        # No personal account involved — the workflow's OIDC token
        # authenticates as `BuildPulseLLC/buildpulse-mcp` itself, which
        # is sufficient to publish under `io.github.buildpulsellc/*`.
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
